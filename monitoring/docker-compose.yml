services:
  graphite:
    image: graphiteapp/graphite-statsd
    container_name: graphite
    ports:
      - "8082:80"
      - "2003:2003"
    restart: unless-stopped
    networks:
      - monitoring

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - graphite
    restart: unless-stopped
    networks:
      - monitoring

  nagios:
    image: jasonrivers/nagios
    ports:
      - "8083:80"
    restart: unless-stopped
    networks:
      - monitoring

networks:
  monitoring:
    external: true
